<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
  <title>JewelTry AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --brand-primary: #561f7a;
      --brand-gold: #D4AF37;
      --brand-glow: rgba(139, 92, 246, 0.4);
    }

    html,
    body {
      min-height: 100%;
      min-height: 100dvh;
      width: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #e2e8f0;
      background-image:
        radial-gradient(at 0% 0%, rgba(86, 31, 122, 0.05) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(212, 175, 55, 0.06) 0px, transparent 50%),
        radial-gradient(at 50% 50%, #f1f5f9 0px, transparent 100%);
      background-attachment: fixed;
      color: #0f172a;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .elevated-card {
      box-shadow:
        0 10px 25px -5px rgba(15, 23, 42, 0.08),
        0 8px 10px -6px rgba(15, 23, 42, 0.03);
    }

    .glass {
      background: rgba(241, 245, 249, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(139, 92, 246, 0.1);
    }

    .result-stage {
      background-image: radial-gradient(circle at center, #ffffff 0%, #f1f5f9 100%);
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.0.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="text-slate-900 min-h-screen">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
